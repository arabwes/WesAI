name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [shibam-financial-mcp, shibam-marketing-mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -r cafe-mcp/${{ matrix.server }}/requirements.txt -e ./cafe-mcp/mcp-common
          pip install pytest pytest-asyncio
      - name: Shared package tests
        run: python -m pytest cafe-mcp/mcp-common/tests -q
      - name: Server tests
        working-directory: cafe-mcp/${{ matrix.server }}
        run: python -m pytest tests -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit -r cafe-mcp/shibam-financial-mcp/requirements.txt || true
          pip-audit -r cafe-mcp/shibam-marketing-mcp/requirements.txt || true
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
