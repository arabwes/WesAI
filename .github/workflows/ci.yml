name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        working-directory: cafe-mcp
        run: |
          pip install -r requirements.txt -e ./mcp-common
          pip install pytest pytest-asyncio
      - name: Tests (server + shared package)
        working-directory: cafe-mcp
        run: python -m pytest tests mcp-common/tests -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit -r cafe-mcp/requirements.txt || true
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
