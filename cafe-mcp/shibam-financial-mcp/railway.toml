# NOT auto-discovered by Railway (Root Directory for this service is the
# shared cafe-mcp/ parent, and Railway only auto-finds railway.toml at the
# Root Directory root). Kept here for reference / local tooling; the
# actual build & start commands are set directly in the Railway service's
# Settings -> Deploy tab (see docs/runbook.md), using these exact values:
[build]
builder = "nixpacks"
buildCommand = "pip install -r shibam-financial-mcp/requirements.txt -e ./mcp-common"

[deploy]
startCommand = "python shibam-financial-mcp/main.py"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
