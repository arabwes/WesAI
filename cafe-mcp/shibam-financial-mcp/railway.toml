# Railway service settings:
#   Root Directory: cafe-mcp
# Railway auto-discovers this file even though it's nested one level below
# Root Directory (confirmed: it resolves paths here as "/shibam-financial-mcp/railway.toml").
# No [build].builder set — Railway picks its current default builder
# (Railpack) rather than pinning the deprecated Nixpacks value.
[build]
buildCommand = "pip install -r shibam-financial-mcp/requirements.txt -e ./mcp-common"

[deploy]
startCommand = "python shibam-financial-mcp/main.py"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
