# Railway service settings for this server:
#   Root Directory: cafe-mcp/shibam-financial-mcp
# (No separate Config Path needed — Railway auto-discovers this file
#  at the Root Directory root.)
[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt -e ../mcp-common"

[deploy]
startCommand = "python main.py"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
