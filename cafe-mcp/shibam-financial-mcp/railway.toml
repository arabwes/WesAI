# Railway service settings for this server:
#   Root Directory: cafe-mcp
#   Config Path:    cafe-mcp/shibam-financial-mcp/railway.toml
[build]
builder = "nixpacks"
buildCommand = "pip install -r shibam-financial-mcp/requirements.txt -e ./mcp-common"

[deploy]
startCommand = "python shibam-financial-mcp/main.py"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
