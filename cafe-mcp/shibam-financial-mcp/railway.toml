# Railway service settings:
#   Root Directory: cafe-mcp
#   (Dockerfile Path is set inside this file below — no separate UI field
#    needed, but if your Railway plan requires it, set it explicitly to
#    shibam-financial-mcp/Dockerfile)
#
# Uses an explicit Dockerfile instead of Railpack/Nixpacks auto-detection:
# Root Directory must be the shared cafe-mcp/ parent (so mcp-common is in
# the build context), but neither service's requirements.txt sits at that
# root, so auto-detection built images with no Python/pip installed at all.
[build]
builder = "DOCKERFILE"
dockerfilePath = "shibam-financial-mcp/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
