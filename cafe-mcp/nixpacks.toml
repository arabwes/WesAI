# Forces Railway/Nixpacks to provision Python + pip for this build.
#
# Root Directory for both MCP services is set to this directory (cafe-mcp/)
# so the shared mcp-common package is inside the build context. But neither
# service's requirements.txt/pyproject.toml sits directly at this root (they
# are nested one level down), so Nixpacks' auto-detection can otherwise pick
# a non-Python base image and pip ends up missing. This file guarantees
# Python is installed regardless of auto-detection.
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]
