cameras:
- camera_id: entrance_front
  name: Front Entrance (mock)
  enabled: true
  source:
    type: mock
    loop: true
    device_index: 0
  processing:
    stream: sub
    target_fps: 5.0
    detection_confidence: 0.3
    min_bbox_area: 400
    reconnect_delay_seconds: 5.0
    max_reconnect_delay_seconds: 60.0
  role:
  - entrance
  - exit
  lines:
  - line_id: front_door
    name: Front Door
    points:
    - - 200.0
      - 150.0
    - - 760.0
      - 150.0
    direction_in: down
    hysteresis_px: 12.0
    cooldown_seconds: 2.0
    min_displacement_px: 20.0
  zones:
