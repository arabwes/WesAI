server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri /index.html;
    }

    # API proxied to the backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
